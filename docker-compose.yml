version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: salon-ai-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: salon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: salon-ai-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: salon-ai-backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    container_name: salon-ai-worker
    command: celery -A app.tasks.worker worker --loglevel=info
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
